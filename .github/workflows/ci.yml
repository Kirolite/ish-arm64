name: CI

on:
  push:
  pull_request:
      branches: [master]
  workflow_dispatch: # 允许您在 Actions 页面手动点击按钮一键打包

jobs:
  build-linux:
    runs-on: ubuntu-20.04
    strategy:
      matrix:
        cc: [clang, gcc]
        kernel: [ish, linux]
    steps:
      - uses: actions/checkout@v2
        with:
            submodules: true
      - uses: actions/setup-python@v2
        with:
            python-version: '3.x'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libarchive-dev
          pip3 install meson ninja
      - name: Clone Linux
        if: matrix.kernel == 'linux'
        run: deps/clone-linux.sh
      - name: Build
        run: |
          meson build -Dengine=asbestos -Dkernel=${{matrix.kernel}}
          ninja -C build
        env:
          CC: ${{matrix.cc}}
      - name: Test
        if: matrix.kernel == 'ish'
        run: ninja -C build test

  build-mac:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v2
        with:
            submodules: true
      - name: Install dependencies
        run: |
          brew install llvm lld ninja libarchive meson

      # 核心修正：加入 -derivedDataPath 参数，强制将编译出的 iSH.app 定向输出到当前目录下的 build 文件夹内
      - name: Build and Pack IPA
        run: |
          xcodebuild -project iSH.xcodeproj -scheme iSH -arch arm64 -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" clean build
          mkdir -p Payload
          mv build/Build/Products/Debug-iphoneos/iSH.app Payload/
          zip -r ish-arm64.ipa Payload

      # 核心修正：升级为最新的 v4 版本上传组件，确保产物能顺利留存供您下载
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iSH-ARM64-TrollStore
          path: ish-arm64.ipa
